<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLLYWOOD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #B8860B;
  --gold2: #DAA520;
  --ink: #FFFFFF;
  --ink2: #F8F8F8;
  --ink3: #F0F0F0;
  --ink4: #E4E4E4;
  --ink5: #CCCCCC;
  --dim: #888888;
  --muted: #555555;
  --soft: #333333;
  --text: #111111;
  --text2: #333333;
  --red: #C0392B; --orange: #D4681A; --yellow: #B8860B;
  --green: #1A7A3A; --blue: #1558A0; --purple: #6B2F9E;
  --grey: #666; --black-c: #222;
  --accent: #1558A0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:14px;}
body{
  background:var(--ink);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  font-weight:300;
  min-height:100vh;
  overflow-x:hidden;
}


/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ── TITLE SCREEN ── */
#screen-title{
  align-items:center;justify-content:center;
  background:#000;
  position:relative;overflow:hidden;
}
/* Animated canvas sits full-bleed behind everything */
#title-canvas{
  position:absolute;inset:0;width:100%;height:100%;z-index:0;
}
.title-content{
  text-align:center;position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
}
.title-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(100px,18vw,200px);
  letter-spacing:0.06em;
  color:#fff;
  line-height:0.85;
  text-shadow:0 0 120px rgba(200,169,81,0.5), 0 0 40px rgba(200,169,81,0.3);
  animation:titlePulse 4s ease-in-out infinite;
}
.title-main span{color:var(--gold);}
@keyframes titlePulse{
  0%,100%{text-shadow:0 0 120px rgba(200,169,81,0.5),0 0 40px rgba(200,169,81,0.3);}
  50%{text-shadow:0 0 180px rgba(200,169,81,0.8),0 0 60px rgba(200,169,81,0.5),0 2px 0 rgba(200,169,81,0.2);}
}
.btn-start{
  margin-top:56px;
  background:transparent;
  border:2px solid var(--gold);
  color:var(--gold);
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:0.35em;
  padding:18px 64px;
  border-radius:2px;
  cursor:pointer;
  transition:all 0.25s;
  position:relative;overflow:hidden;
}
.btn-start::before{
  content:'';position:absolute;inset:0;
  background:var(--gold);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.25s ease;z-index:-1;
}
.btn-start:hover{color:#000;}
.btn-start:hover::before{transform:scaleX(1);}

/* ── GAME HEADER ── */
.game-header{
  background:#FFFFFF;
  border-bottom:2px solid var(--ink5);
  padding:0 32px;height:56px;
  display:flex;align-items:center;gap:24px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.header-logo{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  letter-spacing:0.1em;color:var(--gold);
  flex-shrink:0;
}
.header-phase{
  font-size:11px;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--muted);
}
.header-teams{display:flex;gap:2px;margin-left:auto;}
.header-team{
  padding:6px 14px;border-radius:3px;
  font-size:11px;font-weight:500;letter-spacing:0.08em;
  transition:all .15s;
}
.header-team.active-team{
  background:rgba(21,88,160,0.08);
  color:var(--accent);
  border:1px solid rgba(21,88,160,0.25);
}
.header-budget{
  font-family:'Bebas Neue',sans-serif;font-size:16px;
  letter-spacing:0.06em;
  padding:6px 16px;border-left:2px solid var(--ink5);
  margin-left:8px;color:var(--text);
}

/* ── PHASE CONTENT ── */
.phase-wrap{flex:1;padding:32px;max-width:1320px;width:100%;margin:0 auto;background:#FAFAFA;}
.phase-header{margin-bottom:28px;}
.phase-num{
  font-family:'Bebas Neue',sans-serif;font-size:11px;
  letter-spacing:0.4em;color:var(--dim);text-transform:uppercase;
}
.phase-title{
  font-family:'Bebas Neue',sans-serif;font-size:48px;
  letter-spacing:0.06em;color:var(--accent);line-height:1;margin:4px 0;
}
.phase-desc{font-size:13px;color:var(--muted);line-height:1.6;max-width:640px;}

/* ── BUTTONS ── */
.btn{
  background:none;border:1px solid var(--dim);color:var(--soft);
  font-family:'Barlow',sans-serif;font-weight:500;
  font-size:11px;letter-spacing:0.15em;text-transform:uppercase;
  padding:9px 20px;border-radius:3px;cursor:pointer;transition:all .2s;
}
.btn:hover{border-color:var(--soft);color:var(--text);}
.btn-gold{
  background:var(--gold);border-color:var(--gold);color:var(--ink);
  font-weight:600;
}
.btn-gold:hover{background:#1a6fd4;border-color:#1a6fd4;}
.btn-gold:disabled{background:var(--dim);border-color:var(--dim);color:var(--muted);cursor:default;}

/* ── CARDS ── */
.color-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:3px;
  font-size:9px;font-weight:600;letter-spacing:0.05em;
  color:rgba(255,255,255,0.9);flex-shrink:0;
}
.color-badge.yellow,.color-badge.grey{color:rgba(0,0,0,0.75);}

/* ── DRAFT PHASE ── */
.draft-layout{display:grid;grid-template-columns:1fr 300px;gap:20px;}
.draft-main{display:flex;flex-direction:column;gap:20px;}
.draft-sidebar{display:flex;flex-direction:column;gap:16px;}

.card-category{
  background:var(--ink3);border:1px solid var(--ink4);border-radius:4px;
  overflow:hidden;
}
.cat-header{
  padding:14px 20px;border-bottom:1px solid var(--ink4);
  display:flex;align-items:center;gap:12px;
}
.cat-icon{font-size:18px;}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.1em;color:var(--soft);}
.cat-meta{margin-left:auto;font-size:11px;color:var(--dim);letter-spacing:0.1em;}
.cat-price-info{font-size:11px;color:var(--muted);margin-left:8px;}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:8px;padding:16px;
}
.draft-card{
  border-radius:4px;padding:12px 10px;
  border:1.5px solid transparent;
  cursor:pointer;transition:all .15s;
  position:relative;text-align:center;
  background:var(--ink4);
}
.draft-card:hover:not(.taken):not(.no-funds){
  transform:translateY(-2px);
  border-color:rgba(200,169,81,0.4);
  background:var(--ink5);
}
.draft-card.taken{opacity:0.25;cursor:default;}
.draft-card.owned{border-color:rgba(200,169,81,0.3);background:rgba(200,169,81,0.05);}
.draft-card.no-funds{opacity:0.5;cursor:not-allowed;}
.dc-color{
  width:32px;height:32px;border-radius:3px;
  margin:0 auto 8px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.dc-name{font-size:10px;color:var(--text2);line-height:1.3;margin-bottom:6px;min-height:26px;}
.dc-price{
  font-family:'Bebas Neue',sans-serif;font-size:14px;
  letter-spacing:0.05em;color:var(--gold);
}
.taken-label{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:9px;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--dim);
  background:rgba(8,8,8,0.5);border-radius:4px;
}

/* ── DRAFT SIDEBAR ── */
.turn-box{
  background:var(--ink3);border:1px solid var(--ink4);border-radius:4px;
  padding:20px;text-align:center;
}
.turn-label{font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
.turn-team-name{
  font-family:'Bebas Neue',sans-serif;font-size:28px;
  letter-spacing:0.06em;color:var(--gold);line-height:1.1;
}
.turn-budget{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  color:var(--text2);margin-top:4px;
}
.turn-progress{font-size:11px;color:var(--muted);margin-top:4px;}

.hand-box{
  background:var(--ink3);border:1px solid var(--ink4);border-radius:4px;
  padding:16px;flex:1;overflow-y:auto;max-height:500px;
}
.hand-title{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;}
.hand-team-section{margin-bottom:16px;}
.hand-team-label{
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
  padding-bottom:6px;border-bottom:1px solid var(--ink4);
}
.hand-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--ink4);
}
.hand-item:last-child{border:none;}
.hand-type{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);width:36px;}
.hand-name{font-size:11px;color:var(--text2);flex:1;}
.hand-cost{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--muted);}
.hand-empty{font-size:11px;color:var(--dim);font-style:italic;}

/* ── DIRECTOR PHASE ── */
.director-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;
}
.dir-card{
  background:var(--ink3);border:1px solid var(--ink4);border-radius:4px;
  padding:20px;transition:border-color .2s;
}
.dir-card.signed{border-color:rgba(30,132,73,0.35);}
.dir-card.passed{opacity:0.4;pointer-events:none;}
.dir-card.available{border-color:rgba(200,169,81,0.15);}
.dir-top{display:flex;gap:14px;margin-bottom:14px;}
.dir-avatar{
  width:80px;height:80px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;flex-shrink:0;background:var(--ink4);
}
.dir-info{flex:1;}
.dir-name{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:2px;}
.dir-style{font-size:11px;color:#666;font-style:italic;line-height:1.4;margin-bottom:8px;}
.dir-colors{display:flex;gap:4px;}
.dir-fee-note{font-size:10px;color:#777;margin-top:6px;letter-spacing:0.08em;}
.dir-offer-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
.offer-inp{
  background:var(--ink4);border:1px solid var(--ink5);border-radius:3px;
  color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;
  padding:7px 10px;outline:none;transition:border-color .2s;
}
.offer-inp:focus{border-color:var(--gold);}
.offer-inp.flat{width:90px;}
.offer-inp.pct{width:60px;}
.offer-symbol{font-size:11px;color:var(--muted);}
.dir-status{font-size:11px;margin-top:8px;min-height:16px;font-style:italic;}
.dir-status.accepted{color:#1E8449;}
.dir-status.rejected{color:#C0392B;}
.dir-status.pending{color:var(--muted);}
.signed-tag{
  display:inline-block;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;
  background:rgba(30,132,73,0.15);color:#1E8449;
  border:1px solid rgba(30,132,73,0.3);
  padding:3px 8px;border-radius:2px;margin-top:6px;
}
.whose-turn-banner{
  background:rgba(200,169,81,0.07);border:1px solid rgba(200,169,81,0.2);
  border-radius:4px;padding:14px 20px;margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
}
.wtb-label{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);}
.wtb-team{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--gold);}
.wtb-count{font-size:12px;color:var(--muted);margin-left:auto;}
.dir-progress{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
  margin-bottom:20px;
}
.dir-prog-team{
  background:var(--ink3);border:1px solid var(--ink4);border-radius:4px;
  padding:12px 16px;
}
.dpt-name{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.dpt-count{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.04em;color:var(--text);}
.dpt-pips{display:flex;gap:3px;margin-top:6px;}
.dpt-pip{width:18px;height:6px;border-radius:1px;background:var(--ink5);}
.dpt-pip.filled{background:var(--gold);}

/* ── ASSEMBLE PHASE ── */
.assemble-layout{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.movie-card{
  background:var(--ink3);border:1px solid var(--ink4);border-radius:4px;
  overflow:hidden;
}
.movie-card-header{
  padding:12px 16px;border-bottom:1px solid var(--ink4);
  display:flex;align-items:center;gap:10px;
}
.mc-team-stripe{width:4px;height:32px;border-radius:2px;flex-shrink:0;}
.mc-team-name{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.1em;color:var(--soft);}
.mc-film-num{margin-left:auto;font-size:10px;color:var(--dim);}
.movie-card-body{padding:16px;}
.mc-slot{
  display:flex;align-items:center;gap:8px;
  padding:7px 0;border-bottom:1px solid var(--ink4);
}
.mc-slot:last-of-type{border:none;margin-bottom:8px;}
.mc-slot-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.mc-slot-type{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim);width:52px;flex-shrink:0;}
.mc-slot-name{font-size:11px;color:var(--muted);flex:1;line-height:1.3;}
.mc-slot-name.filled{color:var(--text2);}
.mc-slot-name.empty{font-style:italic;color:var(--dim);}
.mc-settings{border-top:1px solid var(--ink4);padding-top:12px;display:flex;flex-direction:column;gap:8px;}
.mc-setting{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mc-setting-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);flex-shrink:0;}
.mc-select{
  background:var(--ink4);border:1px solid var(--ink5);border-radius:3px;
  color:var(--text);font-family:'Barlow',sans-serif;font-size:11px;
  padding:5px 8px;outline:none;cursor:pointer;width:100%;min-width:0;
}
.mc-budget-input{
  background:var(--ink4);border:1px solid var(--ink5);border-radius:3px;
  color:var(--text);font-family:'Barlow',sans-serif;font-size:12px;
  padding:5px 8px;outline:none;width:90px;text-align:right;
}
.mc-budget-input:focus,.mc-select:focus{border-color:var(--gold);}
.mc-harmony{
  margin-top:10px;background:#F5F7FA;border-radius:3px;padding:10px 12px;border:1px solid var(--ink5);
}
.mc-harmony-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-bottom:7px;}
.harmony-bar{display:flex;gap:3px;margin-bottom:6px;}
.hb-seg{height:5px;flex:1;border-radius:1px;background:var(--ink5);transition:background .3s;}
.hb-seg.filled{background:var(--gold);}  .quality-bar-fill{background:linear-gradient(90deg,#C8A20A,var(--gold));}
.harmony-score-text{font-size:10px;color:var(--muted);}

/* release calendar strip above assemble */
.release-strip{
  display:flex;gap:8px;margin-bottom:20px;
  background:var(--ink3);border:1px solid var(--ink4);
  border-radius:4px;padding:16px 20px;align-items:center;
  flex-wrap:wrap;
}
.rs-month{
  flex:1;min-width:80px;text-align:center;
  padding:10px 8px;border-radius:3px;
  border:1px solid var(--ink5);
  transition:all .2s;
}
.rs-month.crowded{border-color:rgba(192,57,43,0.3);background:rgba(192,57,43,0.05);}
.rs-month.open{border-color:rgba(30,132,73,0.2);background:rgba(30,132,73,0.04);}
.rs-name{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.1em;color:var(--muted);}
.rs-pool{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.04em;color:var(--gold);}
.rs-films{font-size:9px;color:var(--dim);letter-spacing:0.1em;margin-top:2px;}

/* ── RESULTS PHASE ── */
.results-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;}
.results-main{display:flex;flex-direction:column;gap:16px;}
.results-sidebar{display:flex;flex-direction:column;gap:16px;}

.window-result{
  background:var(--ink3);border:1px solid var(--ink4);border-radius:4px;
  overflow:hidden;
}
.wr-header{
  padding:14px 20px;border-bottom:1px solid var(--ink4);
  display:flex;align-items:baseline;gap:14px;
}
.wr-month{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.08em;color:var(--text);}
.wr-pool{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);}
.wr-pool-label{font-size:10px;color:var(--dim);letter-spacing:0.1em;}
.wr-films{padding:0;}
.wr-film-row{
  display:grid;
  grid-template-columns:3fr 80px 80px 80px 80px;
  gap:8px;padding:12px 20px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  align-items:center;
}
.wr-film-row:last-child{border:none;}
.wr-film-row.winner{background:rgba(200,169,81,0.04);}
.wfr-title{font-family:'Playfair Display',serif;font-size:13px;}
.wfr-studio{font-size:10px;color:var(--muted);margin-top:1px;}
.wfr-label{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);margin-bottom:2px;}
.wfr-value{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.04em;}
.wfr-profit.pos{color:#1E8449;}
.wfr-profit.neg{color:#C0392B;}
.wfr-harmony-chips{display:flex;gap:3px;}
.hchip{width:10px;height:10px;border-radius:1px;}
.crown{font-size:14px;margin-right:4px;}

.leaderboard{
  background:var(--ink3);border:1px solid var(--ink4);
  border-radius:4px;padding:20px;
}
.lb-title{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--dim);margin-bottom:16px;}
.lb-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--ink4);
}
.lb-row:last-child{border:none;}
.lb-rank{
  font-family:'Bebas Neue',sans-serif;font-size:32px;
  color:var(--ink5);width:28px;text-align:center;line-height:1;
}
.lb-rank.r1{color:var(--gold);}
.lb-rank.r2{color:var(--soft);}
.lb-rank.r3{color:#8B5E3C;}
.lb-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.06em;flex:1;}
.lb-profit{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.04em;color:var(--gold2);}
.lb-profit.neg{color:#C0392B;}

.multiplier-ref{
  background:var(--ink3);border:1px solid var(--ink4);
  border-radius:4px;padding:16px;
}
.mr-title{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;}
.mr-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--ink4);}
.mr-row:last-child{border:none;}
.mr-label{font-size:11px;color:var(--muted);}
.mr-val{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);}

/* ── SHOP TABLE ── */
.qty-btn{
  background:#FFFFFF;border:2px solid #CCCCCC;border-radius:3px;
  color:#111111;font-size:16px;width:28px;height:28px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;line-height:1;padding:0;
}
.qty-btn:hover{background:#F0F4FF;border-color:var(--accent);color:var(--accent);}
table tr:hover td{background:rgba(21,88,160,0.03);}
table td{border-bottom:1px solid var(--ink5);}
table tr:last-child td{border-bottom:none;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink3);border:1px solid var(--gold);border-radius:4px;
  padding:12px 24px;font-size:12px;letter-spacing:0.1em;
  color:var(--gold);z-index:9000;

<script>
// ════════════════════════════════════════════════════════

const COLORS = ['red','orange','yellow','green','blue','purple','grey','black'];

const COLOR_LABEL = {red:'R',orange:'O',yellow:'Y',green:'G',blue:'B',purple:'P',grey:'★',black:'✕'};
// ── STAR TIER SYSTEM ──
const CAST_TIERS  = [

const SCRIPT_TIERS = [

];
// Supply pool: 3 of each tier per category, shared across all teams
const SUPPLY_PER_TIER = 4;
function initSupply() {
  return {
    cast:    Array.from({length:5}, (_,i) => ({stars:i+1, remaining:SUPPLY_PER_TIER})),
    crew:    Array.from({length:5}, (_,i) => ({stars:i+1, remaining:SUPPLY_PER_TIER})),
    scripts: Array.from({length:5}, (_,i) => ({stars:i+1, remaining:SUPPLY_PER_TIER})),
  };
}
function starStr(n) { return '★'.repeat(n) + '☆'.repeat(5-n); }

// Compact star badge: star outline with number inside
function starBadge(n, size) {
  size = size || '28px';
  var fontSize = 'calc(' + size + ' * 0.45)';
  return '<span style="display:inline-flex;align-items:center;justify-content:center;width:' + size + ';height:' + size + ';position:relative;vertical-align:middle;" title="' + n + ' stars">'
    + '<svg viewBox="0 0 20 20" width="' + size + '" height="' + size + '" style="position:absolute;">'
    + '<polygon points="10,1 12.9,7 19.5,7.6 14.8,11.8 16.4,18.2 10,14.5 3.6,18.2 5.2,11.8 0.5,7.6 7.1,7" fill="none" stroke="#B8860B" stroke-width="1.6"/>'
    + '</svg><span style="position:relative;font-size:' + fontSize + ';font-weight:800;color:#B8860B;line-height:1;">' + n + '</span></span>';
}
// Text-only version for <option> elements
function starBadgeText(n) { return '\u2605' + n; }
function teamAvgStars(team) {
  const all = [...team.purchases.cast, ...team.purchases.crew, ...team.purchases.scripts];
  if(!all.length) return 0;
  const totalStarWeight = all.reduce((s,p) => s + p.stars * p.qty, 0);
  const totalQty = all.reduce((s,p) => s + p.qty, 0);
  return totalQty ? totalStarWeight / totalQty : 0;
}

const RELEASE_WINDOWS = [
  {id:'spring',  name:'Spring',  pool:250},
  {id:'summer',  name:'Summer',  pool:500},
  {id:'fall',    name:'Fall',    pool:750},
  {id:'holiday', name:'Holiday', pool:1000},
];

const HARMONY_MULTIPLIER = {4:3.0, 3:2.0, 2:1.4, 1:0.8, 0:0.4};

// Non-negotiables: 2 hard requirements per director.
// If team doesn't meet them, multiplier on required offer = penalty below.
// cat: 'cast'|'crew'|'script'  minStars: minimum tier required
const DIRECTOR_POOL = [

  {name:"Vera Okafor",    photo:"dir-01.jpg", minFee:14, minPct:6,  stars:4,

  {name:"Tobias Rhenn",   photo:"dir-05.jpg", minFee:5,  minPct:3,  stars:2,

  {name:"Reza Shirazi",   photo:"dir-13.jpg", minFee:23, minPct:9,  stars:5,

  {name:"Malia Fonoti",   photo:"dir-16.jpg", minFee:10, minPct:3,  stars:3,
   reqs:[{cat:'script',minStars:3, label:'★3 Script'},    {cat:'cast',   minStars:2, label:'★2 Cast'}]},
  {name:"Dev Anand",      photo:"dir-17.jpg", minFee:8,  minPct:4,  stars:3,
   reqs:[{cat:'crew',  minStars:3, label:'★3 Crew'},      {cat:'cast',   minStars:2, label:'★2 Cast'}]},
  {name:"Zara Osei",      photo:"dir-18.jpg", minFee:9,  minPct:3,  stars:3,
   reqs:[{cat:'cast',  minStars:3, label:'★3 Cast'},      {cat:'script', minStars:2, label:'★2 Script'}]},
];

// Check non-negotiables against TEAM INVENTORY (signing phase)
// — uses team's best available piece per category
function checkNonNegotiables(dir, team) {
  if(!dir.reqs) return {met:[true,true], penalty:1.0, summary:''};

  function teamBest(cat) {
    const key = cat === 'script' ? 'scripts' : cat;
    return Math.max(0, ...team.purchases[key].filter(p=>p.qty>0).map(p=>p.stars));
  }

  const met = dir.reqs.map(r => teamBest(r.cat) >= r.minStars);
  const unmetCount = met.filter(m => !m).length;
  const penalty = unmetCount === 0 ? 1.0 : unmetCount === 1 ? 1.6 : 2.5;
  const summary = dir.reqs.map((r,i) => `${r.label}: ${met[i] ? '✓' : '✗'}`).join(' · ');
  return {met, penalty, summary};
}

// Check non-negotiables against ASSIGNED FILM PIECES (assemble phase)
// — only the actual cast/crew/script assigned to this specific film counts
// Returns directorMood: +0.5 (both met) → 0 (one met) → -0.5 (neither met)
// and a happiness level 0-4 (😊😊→😐→😞)
function checkFilmNonNegotiables(dir, film) {
  if(!dir || !dir.reqs) return {metCount:2, mood:0.5, face:'😄', label:'Thrilled', color:'#1E8449'};

  function filmVal(cat) {
    if(cat === 'cast')   return film.cast   ? film.cast.stars   : 0;
    if(cat === 'crew')   return film.crew   ? film.crew.stars   : 0;
    if(cat === 'script') return film.script ? film.script.stars : 0;
    return 0;
  }

  const met = dir.reqs.map(r => filmVal(r.cat) >= r.minStars);
  const metCount = met.filter(Boolean).length;

  // mood bonus: +0.5 both met, 0 one met, -0.5 neither met
  const mood = metCount === 2 ? 0.5 : metCount === 1 ? 0 : -0.5;
  const face  = metCount === 2 ? '😄' : metCount === 1 ? '😐' : '😞';
  const label = metCount === 2 ? 'Thrilled' : metCount === 1 ? 'Neutral' : 'Unhappy';
  const color = metCount === 2 ? '#1E8449' : metCount === 1 ? '#B8860B' : '#C0392B';

  return {met, metCount, mood, face, label, color};
}

const SCIFI_ADJ = ['Stellar','Void','Crimson','Neon','Iron','Fractured','Last','Dark','Silent','Zero','Pale','Ghost','Quantum','Binary','Hollow','Ember','Signal','Distant','Deep','Broken','Final','Lost','Rogue','Orbital','Frozen'];
const SCIFI_NOUN = ['Protocol','Meridian','Horizon','Array','Cascade','Drift','Echo','Exodus','Colony','Archive','Rift','Veil','Pulse','Storm','Frequency','Circuit','Vector','Epoch','Orbit','Gravity','Axiom','Sequence','Prism','Threshold','Lattice'];
function genScifiTitle() {
  const a = SCIFI_ADJ[Math.floor(Math.random()*SCIFI_ADJ.length)];
  const n = SCIFI_NOUN[Math.floor(Math.random()*SCIFI_NOUN.length)];
  return a + ' ' + n;
}

const TEAM_COLORS_CSS = ['#D4574A','#D4874A','#4A9D7A','#4A7AD4','#C8A20A','#9B59B6'];
let G = {}; // game state

function initState(names) {
  G = {
    teams: names.map((n,i) => ({
      id: i,
      name: n,
      color: TEAM_COLORS_CSS[i],
      purchases: {
        scripts: Array.from({length:5}, (_,i) => ({stars:i+1, qty:0, tier:SCRIPT_TIERS[i]})),

      directors: [],     // {dirIdx, flatFee, pct}

        script: null,     // {name, color}
        cast: null,
        crew: null,
        budget: null,
        window: null,
        locked: false
      }))
    })),
    directorPool: DIRECTOR_POOL.map((d,i) => ({...d, idx:i, signedBy:null, passed:false, currentBidder:0})),
    phase: 'draft',
    draftTurn: 0,            // team index whose turn it is to purchase
    draftDone: false,        // true when all teams have 9 pieces
    supply: initSupply(),    // shared supply pool
    dirTurn: 0,
    selectedDir: null,

}

function startGame() {
  const names = ['Team 1', 'Team 2', 'Team 3', 'Team 4'];
  initState(names);
  document.getElementById('screen-title').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');

  showPhase('draft');
  renderDraft();
}

function showPhase(phase) {
  ['draft','directors','assemble','results'].forEach(p => {
    document.getElementById('phase-'+p).style.display = p===phase ? '' : 'none';
  });
  const labels = {draft:'Assemble Team', directors:'Director Signing', assemble:'Assemble Films', results:'Box Office Results'};
  document.getElementById('header-phase-label').textContent = labels[phase];
  G.phase = phase;
  renderHeader();
}

function renderHeader() {
  const ht = document.getElementById('header-teams');
  ht.innerHTML = G.teams.map(t =>
    `<div class="header-team${G.draftTurn===t.id && G.phase==='draft' ? ' active-team' : ''}"
      style="color:${t.color};">${t.name}</div>`
  ).join('');
  const activeTeam = G.teams[G.phase==='draft' ? G.draftTurn : G.dirTurn] || G.teams[0];
  
}

function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}

function modal(title, body, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const acts = document.getElementById('modal-actions');
  acts.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + (b.gold ? 'btn-gold' : '');
    btn.textContent = b.label;
    btn.onclick = () => { closeModal(); b.action(); };
    acts.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function teamSlotCount(team, type) {
  return team.purchases[type].reduce((s,p) => s + p.qty, 0);
}

function teamTotalSlots(team) {
  return teamSlotCount(team,'cast') + teamSlotCount(team,'crew') + teamSlotCount(team,'scripts');
}

function teamSpend(team) {
  let total = 0;
  ['cast','crew','scripts'].forEach(type => {
    const tiers = type==='cast'?CAST_TIERS:type==='crew'?CREW_TIERS:SCRIPT_TIERS;
    team.purchases[type].forEach((p,i) => { total += p.qty * tiers[i].price; });
  });
  return total;
}

    row.appendChild(catLabel);

    const tiles = document.createElement('div');
    tiles.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;';

      const supply = G.supply[cat.key][i];

      const remaining = supply.remaining;

      const tile = document.createElement('div');
      const stars = '★'.repeat(tier.stars);
      tile.style.cssText = `width:80px;border:2px solid ${available ? '#1558A0' : '#e0e0e0'};border-radius:7px;padding:8px 6px;text-align:center;

        tile.onmouseenter = () => tile.style.boxShadow = '0 2px 8px rgba(21,88,160,0.25)';
        tile.onmouseleave = () => tile.style.boxShadow = '';

      tile.innerHTML = `

        <div style="font-size:9px;color:${remaining<=1?'#C0392B':'#888'};margin-top:3px;">${soldOut ? 'SOLD OUT' : remaining + ' left'}</div>
        ${purchased > 0 ? `<div style="position:absolute;top:-6px;right:-6px;background:${team.color};color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;">${purchased}</div>` : ''}
      `;
      tiles.appendChild(tile);
    });

    row.appendChild(tiles);
    market.appendChild(row);
  });
}

function draftPick(type, tierIdx) {
  const team = G.teams[G.draftTurn];
  const tiers = type==='cast'?CAST_TIERS:type==='crew'?CREW_TIERS:SCRIPT_TIERS;
  const tier = tiers[tierIdx];
  const supply = G.supply[type][tierIdx];

  if(supply.remaining <= 0) { toast('Sold out!'); return; }
  if(teamSlotCount(team, type) >= 3) { toast(`Already have 3 ${type}`); return; }
  if(teamTotalSlots(team) >= 9) { toast('Already fully stocked'); return; }

  // Make the purchase
  supply.remaining--;
  team.purchases[type][tierIdx].qty++;
  toast(`${team.name} picked ${tier.label} (★${tier.stars}) ${type} for $${tier.price}M`);

  // Advance to next team that still needs picks
  advanceDraftTurn();
}

function advanceDraftTurn() {
  const allDone = G.teams.every(t => teamTotalSlots(t) >= 9);
  if(allDone) {
    G.draftDone = true;
    renderDraft();
    setTimeout(() => {
      modal('Teams Assembled!',
        'All 4 studios have their talent. Time to negotiate with directors.',
        [{label:'Back', action:()=>{}},
         {label:'Sign Directors →', gold:true, action:()=>{ showPhase('directors'); renderDirectors(); }}]
      );
    }, 300);
    return;
  }
  // Find next team that still needs picks
  let next = (G.draftTurn + 1) % 4;
  let loops = 0;
  while(loops < 4) {
    if(teamTotalSlots(G.teams[next]) < 9) break;
    next = (next + 1) % 4;
    loops++;
  }
  G.draftTurn = next;
  renderDraft();
}

          return Array.from({length:p.qty}, () =>

        <span style="font-size:9px;color:#aaa;width:38px;flex-shrink:0;padding-top:3px;text-transform:uppercase;letter-spacing:0.08em;">${cat.label}</span>

function finishDraft() {
  const allDone = G.teams.every(t => teamTotalSlots(t) >= 9);
  if(!allDone) {
    const problems = G.teams.filter(t => teamTotalSlots(t) < 9).map(t => `${t.name}: ${teamTotalSlots(t)}/9 slots filled`);
    modal('Not Ready', problems.join('<br>'), [{label:'Keep Drafting', action:()=>{}}]);
    return;
  }
  modal('Sign Directors?', 'All teams are assembled. Move on to director negotiations?',
    [{label:'Keep Editing', action:()=>{}},
     {label:'Sign Directors →', gold:true, action:()=>{ showPhase('directors'); renderDirectors(); }}]
  );
}

function autoAssignDraft() {
  // Reset supply and purchases
  G.supply = initSupply();
  G.teams.forEach(team => {
    ['cast','crew','scripts'].forEach(type => {
      team.purchases[type].forEach(p => { p.qty = 0; });
    });
  });

  // Assign each team a distinct strategy so simulations vary
  // Strategies differ in: which tier they target, which category they prioritise
  const strategies = [
    // 0: Prestige — go high stars (★4-5) in one category, scrimp elsewhere
    { name:'Prestige Cast',   catPriority:['cast','crew','scripts'],   tierPref:[4,3,2,1,0] },
    // 1: Cheap & Lucky — all low stars, save everything for marketing
    { name:'Budget Blitz',    catPriority:['scripts','crew','cast'],   tierPref:[0,1,2,3,4] },
    // 2: Balanced mid — steady ★3 across the board
    { name:'Balanced',        catPriority:['cast','crew','scripts'],   tierPref:[2,3,1,4,0] },
    // 3: Script-led — chase great scripts first, fill rest cheaply
    { name:'Script Focus',    catPriority:['scripts','cast','crew'],   tierPref:[3,4,2,1,0] },
  ];

  // Shuffle which strategy each team gets so it's random each run
  const shuffled = strategies.map((s,i)=>i).sort(()=>Math.random()-0.5);
  G.teams.forEach((team,i) => { team._strategy = strategies[shuffled[i]]; });

  let safety = 300;
  while(safety-- > 0 && !G.teams.every(t => teamTotalSlots(t) >= 9)) {
    const team = G.teams[G.draftTurn];
    if(teamTotalSlots(team) >= 9) { advanceDraftTurnSilent(); continue; }

    const strat = team._strategy || strategies[0];
    // Pick most-needed category in strategy's preferred order
    const needsCat = strat.catPriority.filter(c => teamSlotCount(team,c) < 3);

    let picked = false;
    for(const cat of needsCat) {
      const tiers = cat==='cast'?CAST_TIERS:cat==='crew'?CREW_TIERS:SCRIPT_TIERS;
      // Try tiers in strategy's preferred order
      for(const ti of strat.tierPref) {
        if(G.supply[cat][ti].remaining > 0) {
          G.supply[cat][ti].remaining--;
          team.purchases[cat][ti].qty++;
          picked = true;
          break;
        }
      }
      if(picked) break;
    }
    // Fallback: take anything available
    if(!picked) {
      outer: for(const cat of ['cast','crew','scripts']) {
        if(teamSlotCount(team,cat) >= 3) continue;
        for(let ti=0;ti<5;ti++) {
          if(G.supply[cat][ti].remaining > 0) {
            G.supply[cat][ti].remaining--;
            team.purchases[cat][ti].qty++;
            picked = true;
            break outer;
          }
        }
      }
    }
    if(!picked) break;
    advanceDraftTurnSilent();
  }

  G.draftTurn = 0;
  renderDraft();
  const names = G.teams.map(t => `${t.name}: ${t._strategy ? t._strategy.name : '—'}`).join(' · ');
  toast('⚡ Auto-drafted — ' + names);
}

function advanceDraftTurnSilent() {
  const allDone = G.teams.every(t => teamTotalSlots(t) >= 9);
  if(allDone) { G.draftDone = true; return; }
  let next = (G.draftTurn + 1) % 4;
  let loops = 0;
  while(loops < 4) {
    if(teamTotalSlots(G.teams[next]) < 9) break;
    next = (next+1)%4; loops++;
  }
  G.draftTurn = next;
}

// ── Roster: all 12 directors, compact cards ──────────────

function renderDirRoster() {
  const roster = document.getElementById('director-roster');
  if(!roster) return;
  roster.innerHTML = '';

  // Group: available → signed → passed, each sorted ★5→★1
  const dirs = G.directorPool.map((d,i) => ({...d, _i:i})).sort((a,b) => b.stars - a.stars);
  const available = dirs.filter(d => !isSigned(d) && !d.passed);
  const signed    = dirs.filter(d => isSigned(d));
  const passed    = dirs.filter(d => !isSigned(d) && d.passed);

  function section(title, list, dimmed) {
    if(!list.length) return;
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#aaa;margin:16px 0 8px;font-family:"Barlow",sans-serif;';
    hdr.textContent = title;
    roster.appendChild(hdr);
    list.forEach(d => roster.appendChild(buildRosterCard(d._i, dimmed)));
  }

  section('Available Directors', available, false);
  section('Signed', signed, true);
  section('Passed', passed, true);
}

function isSigned(d) {
  return d.signedBy !== null && d.signedBy !== undefined;
}

function buildRosterCard(idx, dimmed) {
  const dir = G.directorPool[idx];
  const signed  = isSigned(dir);
  const passed  = !!dir.passed;
  const activeTeam = G.teams[G.dirTurn];
  const isSelected = G.selectedDir === idx;
  const isClickable = !signed && !passed && !dimmed;
  const alreadyFull = activeTeam.directors.length >= 3;

  const div = document.createElement('div');
  div.id = `roster-card-${idx}`;

  const borderColor = isSelected ? '#1558A0' : signed ? '#ccc' : '#e0e0e0';
  const bg = isSelected ? '#EBF2FB' : signed ? '#fafafa' : '#fff';
  div.style.cssText = `display:flex;gap:12px;align-items:center;background:${bg};border:2px solid ${borderColor};border-radius:8px;padding:12px;margin-bottom:8px;cursor:${isClickable && !alreadyFull ? 'pointer' : 'default'};opacity:${dimmed ? 0.5 : 1};transition:border-color 0.15s,background 0.15s;`;

  if(isClickable && !alreadyFull) {
    div.onclick = () => selectDirector(idx);
  }

  const photoSrc = `photos/${dir.photo}`;
  const dirStars = starBadge(dir.stars, '36px');

  const prefHtml = ''; // removed — not shown to players

  let statusHtml = '';
  if(signed) {
    const sTeam = G.teams.find(t => t.id === dir.signedBy);
    statusHtml = `<div style="font-size:11px;color:#888;margin-top:4px;">✓ ${sTeam ? sTeam.name : '?'} · $${dir.dealFee}M + ${dir.dealPct}%</div>`;
  } else if(passed) {
    statusHtml = `<div style="font-size:11px;color:#C0392B;margin-top:4px;">No deal reached</div>`;
  } else if(!alreadyFull) {
    const nn = checkNonNegotiables(dir, G.teams[G.dirTurn]);
    const nnHtml = dir.reqs ? dir.reqs.map((r,i) => {
      const ok = nn.met[i];
      return `<span style="font-size:9px;padding:1px 5px;border-radius:3px;margin-right:3px;margin-top:2px;display:inline-block;
        background:${ok?'#e8f5e9':'#fdecea'};color:${ok?'#1E8449':'#C0392B'};">${r.label}${ok?' ✓':' ✗'}</span>`;
    }).join('') : '';
    statusHtml = `<div style="margin-top:5px;">${nnHtml}<div style="font-size:10px;color:#1558A0;margin-top:4px;font-style:italic;">Click to make an offer</div></div>`;
  }

  div.innerHTML = `
    <img src="${photoSrc}" alt="${dir.name}"
      style="width:56px;height:56px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid #e0e0e0;flex-shrink:0;"
      onerror="this.style.display='none'">
    <div style="flex:1;min-width:0;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:0.05em;color:#111;">${dir.name}</div>
      <div style="font-size:13px;color:var(--gold);">${dirStars}</div>
      ${statusHtml}
    </div>

  `;
  return div;
}

function selectDirector(idx) {
  G.selectedDir = idx;
  // Highlight selected roster card
  G.directorPool.forEach((d,i) => {
    const card = document.getElementById(`roster-card-${i}`);
    if(!card) return;
    const isSel = i === idx;
    card.style.borderColor = isSel ? '#1558A0' : '#e0e0e0';
    card.style.background  = isSel ? '#EBF2FB' : '#fff';
  });
  renderOfferPanel();
}

// ── Offer panel: appears when a director is selected ─────

function renderOfferPanel() {
  const panel = document.getElementById('dir-offer-panel');
  if(!panel) return;

  const activeTeam = G.teams[G.dirTurn];
  const idx = G.selectedDir;

  if(idx === null || idx === undefined) {
    panel.innerHTML = `<div style="background:#fff;border:2px dashed #e0e0e0;border-radius:10px;padding:32px 20px;text-align:center;color:#bbb;font-size:13px;font-style:italic;">
      ← Select a director to make an offer
    </div>`;
    return;
  }

  const dir = G.directorPool[idx];
  if(isSigned(dir) || dir.passed) {
    panel.innerHTML = '';
    G.selectedDir = null;
    return;
  }

  // Roster chips
  const cats = [
    {key:'cast', label:'CAST', tiers:CAST_TIERS},
    {key:'crew', label:'CREW', tiers:CREW_TIERS},
    {key:'scripts', label:'SCRIPTS', tiers:SCRIPT_TIERS},
  ];
  const rosterRows = cats.map(cat => {
    const items = [];
    activeTeam.purchases[cat.key].forEach(p => {
      if(p.qty > 0) {
        const tier = cat.tiers[p.stars-1];
        const stars = '★'.repeat(p.stars) + '<span style="color:#ddd;">★</span>'.repeat(5-p.stars);
        items.push(`<span style="display:inline-flex;align-items:center;gap:3px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:3px;padding:2px 6px;margin:2px 2px 0 0;font-size:10px;">${stars} <span style="color:#555;font-size:9px;">${tier.label}</span>${p.qty>1?`<span style="color:#999;font-size:9px;">×${p.qty}</span>`:''}</span>`);
      }
    });
    if(!items.length) return '';
    return `<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;">
      <span style="font-size:9px;letter-spacing:0.1em;color:#999;text-transform:uppercase;width:44px;flex-shrink:0;padding-top:3px;">${cat.label}</span>
      <div>${items.join('')}</div>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div style="background:#fff;border:2px solid #1558A0;border-radius:10px;overflow:hidden;">
      <div style="background:#1558A0;padding:12px 16px;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;letter-spacing:0.05em;">${dir.name}</div>
      </div>
      <div style="padding:16px;">
        <div style="font-size:11px;color:#aaa;margin-bottom:4px;">Offering studio</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${activeTeam.color};letter-spacing:0.05em;margin-bottom:2px;">${activeTeam.name}</div>

        <div style="font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#aaa;margin-bottom:6px;">${activeTeam.name}'s roster</div>
        ${rosterRows}

        <div style="border-top:1px solid #eee;margin:14px 0 12px;"></div>

        <div style="font-size:11px;color:#999;font-style:italic;margin-bottom:8px;">Terms undisclosed — make your offer</div>
        ${(()=>{
          const nn = checkNonNegotiables(dir, activeTeam);
          const chips = dir.reqs ? dir.reqs.map((r,i)=>{
            const ok = nn.met[i];
            return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span style="font-size:10px;padding:2px 8px;border-radius:3px;background:${ok?'#e8f5e9':'#fdecea'};color:${ok?'#1E8449':'#C0392B'};font-weight:600;">${r.label}</span>
              <span style="font-size:10px;color:${ok?'#1E8449':'#C0392B'};">${ok?'✓ You have this':'✗ You lack this'}</span>
            </div>`;
          }).join('') : '';
          return chips;
        })()}

        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="font-size:12px;color:#555;">$</span>
            <input id="offer-fee" type="number" min="0" placeholder="Flat fee (M)"
              style="width:100px;border:1px solid #ccc;border-radius:4px;padding:7px 10px;font-size:13px;font-family:'Barlow',sans-serif;">
            <span style="font-size:12px;color:#555;">M</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="font-size:12px;color:#555;">+</span>
            <input id="offer-pct" type="number" min="0" max="99" placeholder="%"
              style="width:70px;border:1px solid #ccc;border-radius:4px;padding:7px 10px;font-size:13px;font-family:'Barlow',sans-serif;">
            <span style="font-size:12px;color:#555;">%</span>
          </div>
        </div>
        <button onclick="submitOffer(${idx})" id="offer-submit-btn"
          style="margin-top:12px;width:100%;padding:10px;background:var(--gold);color:#fff;border:none;border-radius:5px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.1em;cursor:pointer;">
          MAKE OFFER TO ${dir.name.split(' ')[0].toUpperCase()}
        </button>
      </div>
    </div>
  `;
}

// ── Submit offer ─────────────────────────────────────────

function submitOffer(idx) {
  const dir  = G.directorPool[idx];
  const team = G.teams[G.dirTurn];
  const fee  = parseFloat((document.getElementById('offer-fee') || {}).value) || 0;
  const pct  = parseFloat((document.getElementById('offer-pct') || {}).value) || 0;
  const btn  = document.getElementById('offer-submit-btn');

  if(fee <= 0 && pct <= 0)      { toast('Enter a fee and/or percentage'); return; }
  if(pct >= 100)                 { toast('Cannot offer 100%+ equity'); return; }
  if(team.directors.length >= 3) { toast('Already have 3 directors'); return; }
  if(isSigned(dir))              { toast('That director is already signed'); return; }

  if(btn) { btn.disabled = true; btn.textContent = 'Waiting...'; }

  const result = evaluateDirectorOffer(dir, team, fee, pct);

  if(result.verdict === 'accept') {
    dir.signedBy = team.id; dir.dealFee = fee; dir.dealPct = pct;
    team.directors.push({dirIdx:idx, flatFee:fee, pct});
    modal(
      `✓ ${dir.name} — SIGNED`,
      `<div style="font-size:15px;color:var(--gold);margin-bottom:8px;">"${result.message}"</div>
       <div style="font-size:13px;color:var(--muted);">Deal: <strong>$${fee}M</strong> flat + <strong>${pct}%</strong> back-end · signed with <strong style="color:${team.color}">${team.name}</strong></div>`,
      [{label:'Next team →', gold:true, action:() => { G.selectedDir = null; doAdvanceTurn(); }}]
    );

  } else if(result.verdict === 'counter') {
    modal(
      `↩ ${dir.name} — COUNTER`,
      `<div style="font-size:15px;color:#D4874A;margin-bottom:8px;">"${result.message}"</div>
       <div style="font-size:13px;color:var(--muted);">Counter: <strong>$${result.counterFee}M</strong> flat + <strong>${result.counterPct}%</strong> back-end</div>
       <div style="font-size:11px;color:#aaa;margin-top:8px;">Accept the counter or pass — next team is up either way.</div>`,
      [
        {label:'Pass', action:() => { G.selectedDir = null; doAdvanceTurn(); }},
        {label:`Accept $${result.counterFee}M + ${result.counterPct}%`, gold:true, action:() => {
          dir.signedBy = team.id; dir.dealFee = result.counterFee; dir.dealPct = result.counterPct;
          team.directors.push({dirIdx:idx, flatFee:result.counterFee, pct:result.counterPct});
          G.selectedDir = null;
          doAdvanceTurn();
        }}
      ]
    );

  } else {
    modal(
      `✗ ${dir.name} — DECLINED`,
      `<div style="font-size:15px;color:#C0392B;margin-bottom:8px;">"${result.message}"</div>
       <div style="font-size:12px;color:#aaa;">Next team is up.</div>`,
      [{label:'Next team →', gold:true, action:() => { G.selectedDir = null; doAdvanceTurn(); }}]
    );
  }
}

function doAdvanceTurn() {
  // Find next team that still needs directors
  let next = (G.dirTurn + 1) % 4;
  let loops = 0;
  while(loops < 4) {
    if(G.teams[next].directors.length < 3) break;
    next = (next+1) % 4;
    loops++;
  }
  if(G.teams.every(t => t.directors.length >= 3)) {
    renderDirRoster();
    renderDirProgress();
    renderHeader();
    renderOfferPanel();
    setTimeout(() => {
      modal('All Directors Signed!', 'Every studio has 3 directors. Time to assemble your films.',
        [{label:'Back', action:()=>{}},
         {label:'Assemble Films →', gold:true, action:()=>{ showPhase('assemble'); renderAssemble(); }}]
      );
    }, 400);
    return;
  }
  G.dirTurn = next;
  renderDirTurnBanner();
  renderDirRoster();
  renderDirProgress();
  renderHeader();
  renderOfferPanel();
}

// Keep these names for backward compat (save/load, auto-sign)
function advanceTurn() { doAdvanceTurn(); }
function refreshCard(idx) { renderDirRoster(); renderDirProgress(); renderHeader(); }

// ── Evaluate an offer ────────────────────────────────────

function evaluateDirectorOffer(dir, team, fee, pct) {
  // Apply non-negotiable penalty: missing requirements raise the effective ask
  const nn = checkNonNegotiables(dir, team);
  // ── Accept conditions (hard thresholds, NOT ratio-based) ──
  // ★★★★★: requires BOTH high flat fee AND 20%+ back-end to consider accepting
  //         Even then, 70% chance they still counter (they love to negotiate)
  // ★★★★:  requires high fee OR 20%+ back-end; 50% chance they still counter
  // ★★★:   accepts if offer is reasonably close to their ask
  // ★★/★:  fairly easy to please

  const isElite  = dir.stars >= 5;
  const isStrong = dir.stars === 4;

  // Hard accept gates for top directors
  const meetsEliteBar   = pct >= 20 || fee >= dir.minFee * 2.0;
  const meetsStrongBar  = pct >= 20 || fee >= dir.minFee * 1.5;

  // Money score for counter math
  const moneyScore   = fee + pct * 1.8;
  const baseAsk      = dir.minFee + dir.minPct * 1.8;
  const personality  = 0.90 + (dir.idx % 5) * 0.05;
  // Non-negotiable penalty raises the effective ask — missing requirements = harder to sign
  const effectiveAsk = baseAsk * personality * nn.penalty;
  const ratio        = moneyScore / effectiveAsk;

  // ── ACCEPT ──
  if(isElite) {
    // ★★★★★: only accept if meets bar AND they feel generous (30% of the time)
    if(meetsEliteBar && ratio >= 1.0 && Math.random() < 0.30) {
      return {verdict:'accept', message:pick([
        "You've done your homework. I respect that. Deal.",
        "That's what I was hoping to hear. Let's make history.",
        "Generous terms. I'm in — don't make me regret it.",
      ])};
    }
  } else if(isStrong) {
    // ★★★★: accept if meets bar AND ratio is good; still 50% chance they counter
    if(meetsStrongBar && ratio >= 0.92 && Math.random() < 0.50) {
      return {verdict:'accept', message:pick([
        "Now we're talking. You've got a deal.",
        "That works for me. Let's get into pre-production.",
        "I was hoping you'd come in strong. Consider it done.",
      ])};
    }
  } else if(dir.stars === 3) {
    if(ratio >= 0.85) {
      return {verdict:'accept', message:pick([
        "Works for me. Let's shoot.",
        "Good offer. I'm in.",
        "Consider it done.",
        "You had me at the number. Let's go.",
      ])};
    }
  } else {
    // ★★/★: grateful for the work
    if(ratio >= 0.70) {
      return {verdict:'accept', message:pick([
        "Absolutely. Thank you for the opportunity.",
        "I won't let you down. Deal.",
        "You won't regret this. I'm ready.",
      ])};
    }
  }

  // ── COUNTER ──
  // Counter floor: ★★★★★ counters anything ≥ 45% of ask; others ≥ 50%
  const counterFloor = isElite ? 0.45 : isStrong ? 0.50 : 0.55;
  if(ratio >= counterFloor) {
    const needed = effectiveAsk - moneyScore;

    // ★★★★★/★★★★ aggressively push for equity (recurring income)
    const wantsEq = dir.minPct > 0 && (isElite || isStrong || Math.random() > 0.5);
    let counterFee, counterPct;

    if(isElite) {
      // Elite: always demand 20%+ if they don't have it, PLUS a strong flat fee
      const targetPct = Math.max(pct, 20, dir.minPct);
      const targetFee = Math.max(fee + 3, dir.minFee + Math.ceil(needed * 0.5));
      counterFee = targetFee;
      counterPct = Math.min(45, targetPct);
    } else if(isStrong) {
      // Strong: push for 20% if not there, or meaningful fee bump
      const targetPct = wantsEq ? Math.max(pct, 20, dir.minPct) : pct;
      const targetFee = wantsEq
        ? Math.max(fee + 2, dir.minFee)
        : Math.max(fee + 3, Math.ceil(fee + needed * 0.70));
      counterFee = targetFee;
      counterPct = Math.min(40, targetPct);
    } else {
      // Mid-tier: more modest counter
      counterFee = Math.max(fee + 1, Math.ceil(fee + needed * 0.60));
      counterPct = wantsEq
        ? Math.min(30, pct + Math.max(1, Math.ceil(needed * 0.4 / 1.8)))
        : pct;
    }

    // Sanity: counter must always be strictly better than offer
    if(counterFee === fee && counterPct === pct) counterFee = fee + 2;

    const missingReqs = dir.reqs ? dir.reqs.filter((r,i) => !nn.met[i]).map(r=>r.label) : [];
    const reqNote = missingReqs.length > 0 ? ` And frankly — ${missingReqs.join(', ')} is non-negotiable for me.` : '';
    const eliteMsgs = [
      `I appreciate the gesture. But my name moves the needle — and my deal needs to reflect that.${reqNote}`,
      `Interesting opener. Let me tell you what it actually takes.${reqNote}`,
      `You want me. I want 20 points on the back end. We can work from there.${reqNote}`,
      `Not even close. But I like your studio — let's find a number that works.${reqNote}`,
      `I've turned down bigger studios for less interesting projects. Make it worth my while.${reqNote}`,
    ];
    const strongMsgs = [
      "You're in the right neighborhood. Here's where I land.",
      "Almost there — I need the back-end to reflect the risk I'm taking.",
      "Good start. I'll need a bit more on the points.",
      "I'm interested. My counter is non-negotiable but fair.",
      "You want commitment? Show me 20 points and we're done talking.",
    ];
    const midMsgs = [
      "You're close. One more step and we have a deal.",
      "Good faith offer. Here's mine.",
      "Almost there — meet me here.",
      "I like the project. Let's make the numbers work.",
    ];

    const msg = isElite ? pick(eliteMsgs) : isStrong ? pick(strongMsgs) : pick(midMsgs);
    return {verdict:'counter', message:msg, counterFee, counterPct};
  }

  // ── DECLINE ──
  const eliteDecline = [
    "I have three other offers. Call me when you're serious.",
    "That's not a number — that's an insult. Pass.",
    "My agent will pretend this call never happened.",
    "You're going to need to do better than that to get me in a room.",
  ];
  const genDecline = [
    "I appreciate the call, but the offer isn't there.",
    "Come back when the numbers make sense.",
    "That's not a serious offer. Pass.",
    "The project interests me — the deal doesn't.",
    "My agent's already on the phone with another studio.",
  ];
  return {verdict:'decline', message: isElite ? pick(eliteDecline) : pick(genDecline)};
}

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ════════════════════════════════════════════════════════
//  PHASE 4: ASSEMBLE
// ════════════════════════════════════════════════════════
function renderAssemble() {
  renderReleasStrip();
  renderFilmTabs();
  renderAssembleGrid();
  updateAssembleStatus();
}

function renderReleasStrip() {
  const strip = document.getElementById('release-strip');
  strip.innerHTML = '<span style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);margin-right:8px;">Windows:</span>';
  RELEASE_WINDOWS.forEach(w => {
    const count = countFilmsInWindow(w.id);
    const crowded = count >= 4;
    const div = document.createElement('div');
    div.className = 'rs-month' + (crowded ? ' crowded' : count===0 ? ' open' : '');
    div.innerHTML = `<div class="rs-name">${w.name.toUpperCase()}</div><div class="rs-pool">$${w.pool}M</div><div class="rs-films">${count} film${count!==1?'s':''}</div>`;
    strip.appendChild(div);
  });
}

function countFilmsInWindow(windowId) {
  let count = 0;
  G.teams.forEach(t => t.films.forEach(f => { if(f.window===windowId) count++; }));
  return count;
}

function renderFilmTabs() {
  const tabs = document.getElementById('film-tabs');
  tabs.innerHTML = Array.from({length:3}, (_,i) =>
    `<div class="film-tab${G.filmTab===i?' active':''}" onclick="setFilmTab(${i})">Film #${i+1}</div>`
  ).join('');
}

function setFilmTab(i) {
  G.filmTab = i;
  renderFilmTabs();
  renderAssembleGrid();
}

function renderAssembleGrid() {
  const grid = document.getElementById('assemble-grid');
  grid.innerHTML = '';
  const fi = G.filmTab;
  G.teams.forEach(team => {
    const film = team.films[fi];
    grid.appendChild(buildMovieCard(team, film, fi));
  });
  renderReleasStrip();
  updateAssembleStatus();
}

function buildMovieCard(team, film, fi) {
  const card = document.createElement('div');
  card.className = 'movie-card';
  card.id = `mc-${team.id}-${fi}`;

  // Director options: this team's signed directors not yet used in other films
  // Directors can be used on up to 4 films — count how many times each is already used (excluding this film)
  const dirUsageCount = {};
  team.directors.forEach(d => { dirUsageCount[d.dirIdx] = 0; });
  team.films.forEach((f, i) => {
    if(i !== fi && f.director !== null && dirUsageCount[f.director] !== undefined) {
      dirUsageCount[f.director]++;
    }
  });
  const availDirs = team.directors.filter(d => dirUsageCount[d.dirIdx] < 1);

  // Build star tier options for each slot type
  // Each team has a pool of purchased tiers; each film uses 1 slot from any tier (tracked by slot index)
  // Films store: {type:'cast', stars:3} etc.
  function tierOptions(type, filmKey, tiers) {
    const purchased = team.purchases[type];
    // Count how many of each tier are used by other films
    const used = {};
    team.films.forEach((f,i) => {
      if(i !== fi && f[filmKey] !== null) {
        const k = f[filmKey].stars;
        used[k] = (used[k]||0) + 1;
      }
    });
    let opts = `<option value="">— choose —</option>`;
    tiers.forEach(tier => {
      const bought = purchased[tier.stars-1].qty;
      const usedCount = used[tier.stars]||0;
      const avail = bought - usedCount;
      const sel = film[filmKey]?.stars === tier.stars ? ' selected' : '';
      const starStr = starBadgeText(tier.stars) + ' ';
      const disabled = avail <= 0 && film[filmKey]?.stars !== tier.stars ? ' disabled' : '';
      opts += `<option value="${tier.stars}"${sel}${disabled}>${starStr} ${tier.label} · $${tier.price}M (${avail} avail)</option>`;
    });
    return opts;
  }

  const scriptOptions = tierOptions('scripts', 'script', SCRIPT_TIERS);
  const castOptions   = tierOptions('cast',    'cast',   CAST_TIERS);
  const crewOptions   = tierOptions('crew',    'crew',   CREW_TIERS);

  const windowOptions = `<option value="">— choose —</option>` +
    RELEASE_WINDOWS.map(w => `<option value="${w.id}"${film.window===w.id?' selected':''}>${w.name} · $${w.pool}M pool</option>`).join('');

  const harmonyScore = computeHarmony(team, film);
  const harmonySegs = Array.from({length:4}, (_,i) =>
    `<div class="hb-seg${i < harmonyScore.matches ? ' filled' : ''}"></div>`
  ).join('');

  const dirDir = film.director !== null ? G.directorPool[film.director] : null;
  const starSwatch = (s) => s ? starBadge(s.stars, '30px') : `<span style="color:var(--ink5);font-size:11px;">—</span>`;

  const titleVal = film.title || '';

  card.innerHTML = `
    <div class="movie-card-header">
      <div class="mc-team-stripe" style="background:${team.color};"></div>
      <div class="mc-team-name" style="color:${team.color};">${team.name}</div>
    </div>
    <div class="movie-card-body">
      <div style="font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);padding:7px 2px 10px;border-bottom:1px solid var(--ink4);margin-bottom:10px;letter-spacing:0.03em;">${titleVal}</div>
      <div class="mc-slot">
        <div class="mc-slot-icon">🎬</div>
        <div class="mc-slot-type">Director</div>
        <select class="mc-select" style="flex:1;" onchange="setFilmPiece(${team.id},${fi},'director',this.value)">${
          `<option value="">— choose —</option>` +
          availDirs.map(d => {
            const dir = G.directorPool[d.dirIdx];
            const uses = dirUsageCount[d.dirIdx];
            return `<option value="${d.dirIdx}"${film.director===d.dirIdx?' selected':''}>${dir.name} ${starBadgeText(dir.stars)}</option>`;
          }).join('')
        }</select>
      </div>
      <div class="mc-slot">
        <div class="mc-slot-icon">📄</div>
        <div class="mc-slot-type">Script</div>
        <select class="mc-select" style="flex:1;" onchange="setFilmPiece(${team.id},${fi},'script',this.value)">${scriptOptions}</select>
        ${starSwatch(film.script)}
      </div>
      <div class="mc-slot">
        <div class="mc-slot-icon">🎭</div>
        <div class="mc-slot-type">Cast</div>
        <select class="mc-select" style="flex:1;" onchange="setFilmPiece(${team.id},${fi},'cast',this.value)">${castOptions}</select>
        ${starSwatch(film.cast)}
      </div>
      <div class="mc-slot">
        <div class="mc-slot-icon">⚙️</div>
        <div class="mc-slot-type">Crew</div>
        <select class="mc-select" style="flex:1;" onchange="setFilmPiece(${team.id},${fi},'crew',this.value)">${crewOptions}</select>
        ${starSwatch(film.crew)}
      </div>
      <div class="mc-settings">
        <div class="mc-setting">
          <div class="mc-setting-label">Marketing $</div>
          <div style="display:flex;align-items:center;gap:4px;flex:1;">
            <input class="mc-budget-input" type="number" min="0" placeholder="0"
              value="${film.budget || ''}"
              onchange="setFilmBudget(${team.id},${fi},this.value)"
              style="width:70px;background:#fff;border:2px solid #ccc;color:#111;border-radius:3px;padding:4px 6px;font-size:12px;text-align:right;">
            <span style="font-size:11px;color:#888;">M</span>
          </div>
        </div>
        <div class="mc-setting">
          <div class="mc-setting-label">Release</div>
          <select class="mc-select" onchange="setFilmWindow(${team.id},${fi},this.value)">${windowOptions}</select>
        </div>
      </div>
      <div class="mc-harmony">
        <div class="mc-harmony-label">FILM SCORE PREVIEW</div>
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:10px;letter-spacing:0.1em;color:#888;text-transform:uppercase;">Quality</span>
            <span style="font-size:13px;font-weight:700;color:#111;">${harmonyScore.avgStars ? starBadge(harmonyScore.avgStars % 1 === 0 ? harmonyScore.avgStars : parseFloat(harmonyScore.avgStars.toFixed(1)),'26px') + (harmonyScore.mood && harmonyScore.mood.mood !== 0 ? ' <span style="font-size:9px;color:#aaa;">(raw ' + harmonyScore.rawAvg.toFixed(1) + ' ' + (harmonyScore.mood.mood > 0 ? '+' : '') + harmonyScore.mood.mood.toFixed(1) + ')</span>' : '') : '—'}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:10px;letter-spacing:0.1em;color:#888;text-transform:uppercase;">Director</span>
            ${harmonyScore.mood && harmonyScore.mood.face !== '—' ? `<span style="font-size:13px;" title="${harmonyScore.mood.label}: ${harmonyScore.mood.mood > 0 ? '+' : ''}${harmonyScore.mood.mood.toFixed(1)} quality bonus">${harmonyScore.mood.face} <span style="font-size:11px;font-weight:700;color:${harmonyScore.mood.color};">${harmonyScore.mood.mood > 0 ? '+' : ''}${harmonyScore.mood.mood.toFixed(1)}</span></span>` : '<span style="font-size:12px;color:#aaa;">—</span>'}
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:10px;letter-spacing:0.1em;color:#888;text-transform:uppercase;">Marketing</span>
            <span style="font-size:13px;font-weight:700;color:#111;">${film.budget ? '$' + film.budget + 'M' : '—'}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:10px;letter-spacing:0.1em;color:#888;text-transform:uppercase;">Luck</span>
            <span style="font-size:12px;color:#aaa;font-style:italic;">1–100 at release</span>
          </div>
        </div>
        ${harmonyScore.mood && harmonyScore.mood.face !== '—' ? `<div style="font-size:9px;margin-top:8px;padding:5px 7px;border-radius:4px;background:${harmonyScore.mood.metCount===2?'#e8f5e9':harmonyScore.mood.metCount===1?'#fffde7':'#fdecea'};color:${harmonyScore.mood.color};">
          ${harmonyScore.mood.face} Director is ${harmonyScore.mood.label.toLowerCase()}
          ${harmonyScore.mood.mood !== 0 ? '— ' + (harmonyScore.mood.mood > 0 ? '+' : '') + harmonyScore.mood.mood.toFixed(1) + ' quality bonus' : ''}
        </div>` : ''}
        <div style="font-size:9px;color:#ccc;margin-top:8px;border-top:1px solid #eee;padding-top:6px;">Score = Quality×3 + Marketing×2 + Luck×1</div>
      </div>
    </div>
  `;
  return card;
}

function setFilmTitle(teamId, fi, val) {
  G.teams[teamId].films[fi].title = val;
}

function setFilmPiece(teamId, fi, piece, val) {
  const team = G.teams[teamId];
  const film = team.films[fi];
  if(piece === 'director') {
    film.director = val === '' ? null : parseInt(val);
  } else {
    if(val === '') {
      film[piece] = null;
    } else {
      const stars = parseInt(val);
      const tierMap = {script: SCRIPT_TIERS, cast: CAST_TIERS, crew: CREW_TIERS};
      const tier = tierMap[piece].find(t => t.stars === stars);
      film[piece] = tier ? {stars, label: tier.label, price: tier.price} : null;
    }
  }
  renderAssembleGrid();
}

function updateAssembleStatus() {

function computeHarmony(team, film) {
  const pieces = [];
  if(film.director !== null && film.director !== undefined) pieces.push(G.directorPool[film.director].stars);
  if(film.script) pieces.push(film.script.stars);
  if(film.cast)   pieces.push(film.cast.stars);
  if(film.crew)   pieces.push(film.crew.stars);

  if(pieces.length === 0) return {matches:0, label:'No pieces assigned', multiplier:0, qualityScore:0, qualityMult:0, mood:null, desc:'Assign all 4 pieces to score', avgStars:0};

  const rawAvg = pieces.reduce((a,b)=>a+b,0) / pieces.length;

  // Director happiness shifts the effective avg BEFORE quality formula
  // Thrilled (+0.5 stars): both non-negotiables met
  // Neutral  (+0.0):       one met
  // Unhappy  (-0.5 stars): neither met — e.g. avg 4.3 → 3.8
  const dir = (film.director !== null && film.director !== undefined) ? G.directorPool[film.director] : null;
  const moodData = dir ? checkFilmNonNegotiables(dir, film) : {mood:0, face:'—', label:'', color:'#aaa', metCount:2};

  const avg  = Math.max(1, Math.min(5, rawAvg + moodData.mood)); // clamp 1–5
  const minS = Math.min(...pieces);
  const maxS = Math.max(...pieces);

  const qualityScore = (avg - 1) / 4;
  const base    = 0.45 + Math.pow(qualityScore, 0.95) * 1.70;
  const synergy = 1.0 + Math.max(0, minS - 2) * 0.20;
  const spike   = maxS >= 5 ? 1.25 : maxS >= 4 ? 1.10 : 1.0;
  const qualityMult = base * synergy * spike;

  const barScore = qualityMult >= 3.5 ? 4 : qualityMult >= 2.5 ? 3 : qualityMult >= 1.5 ? 2 : qualityMult >= 0.9 ? 1 : 0;
  const labels = {4:'ELITE', 3:'STRONG', 2:'SOLID', 1:'MODEST', 0:'WEAK'};

  return {
    matches: barScore,
    label: labels[barScore],
    multiplier: qualityMult.toFixed(2),
    qualityScore,
    qualityMult,
    baseQuality: qualityMult,
    mood: moodData,
    rawAvg,             // pre-mood average
    avgStars: avg       // post-mood effective average (used in scoring)
  };
}



function autoAssignAll() {
  // Distribute purchased star tiers across 6 films per team
  // Strategy: spread stars evenly across films for balanced quality
  G.teams.forEach(team => {
    const keyMap = {scripts:'script', cast:'cast', crew:'crew'};
    const tierMap = {scripts:SCRIPT_TIERS, cast:CAST_TIERS, crew:CREW_TIERS};

    ['scripts','cast','crew'].forEach(type => {
      const filmKey = keyMap[type];
      const tiers = tierMap[type];
      // Build a flat list of all purchased slots
      const slots = [];
      team.purchases[type].forEach(p => {
        for(let i=0;i<p.qty;i++) slots.push({stars:p.stars, label:tiers[p.stars-1].label, price:tiers[p.stars-1].price});
      });
      // Sort descending by stars, then spread across films
      slots.sort((a,b)=>b.stars-a.stars);
      team.films.forEach((f,i) => { f[filmKey] = slots[i] || null; });
    });
  });
  renderAssembleGrid();
  toast('⚡ Star tiers auto-assigned across all films');
}


function autoSignAllDirectors() {
  // Reset any existing director assignments
  G.teams.forEach(t => { t.directors = []; });
  G.directorPool.forEach(d => { d.signedBy = null; d.passed = false; d.dealFee = undefined; d.dealPct = undefined; });

  // Sort directors best→worst so teams compete for top talent
  const ranked = G.directorPool
    .map((d,i) => ({...d, i}))
    .sort((a,b) => b.stars - a.stars || a.minFee - b.minFee);

  // Round-robin: each team picks 1 director per round, 2 rounds total
  for(let round = 0; round < 3; round++) {
    G.teams.forEach(team => {
      if(team.directors.length > round) return; // already picked this round (3 rounds)
      // Find best available affordable director
      const pick = ranked.find(d =>
        !G.directorPool[d.i].signedBy &&
        !G.directorPool[d.i].passed &&
        true // no budget constraint
      );
      if(pick) {
        const dir = G.directorPool[pick.i];
        dir.signedBy = team.id;
        dir.dealFee = pick.minFee;
        dir.dealPct = pick.minPct;
        team.directors.push({dirIdx: pick.i, flatFee: pick.minFee, pct: pick.minPct});
      }
    });
  }

  // Mark remaining as passed
  G.directorPool.forEach(d => { if(!d.signedBy) d.passed = true; });

  // Advance turn to first team that still needs a director (likely none)
  G.dirTurn = 0;
  renderDirectors();
  renderDirProgress();
  renderHeader();
  toast('⚡ Directors auto-signed — 3 per team');

  // Check if all done and show proceed modal
  const allSigned = G.teams.every(t => t.directors.length >= 3);
  if(allSigned) {
    setTimeout(() => {
      modal('All Directors Signed!',
        'Every studio has 2 directors. Ready to assemble your films.',
        [{label:'Back', action:()=>{}},
         {label:'Assemble Films →', gold:true, action:()=>{ showPhase('assemble'); renderAssemble(); }}]
      );
    }, 400);
  }
}

function autoAssembleAllFilms() {
  const windows = ['spring','summer','fall','holiday'];
  const marketingOptions = [0, 10, 20, 30, 40, 50, 75, 100];

  G.teams.forEach(team => {
    // Build flat lists of each piece type, shuffled randomly
    const tierMap = {scripts:SCRIPT_TIERS, cast:CAST_TIERS, crew:CREW_TIERS};
    const pieces = {};
    ['scripts','cast','crew'].forEach(type => {
      const slots = [];
      team.purchases[type].forEach(p => {
        const tier = tierMap[type][p.stars-1];
        for(let k=0;k<p.qty;k++) slots.push({stars:p.stars, label:tier.label, price:tier.price});
      });
      // Randomly shuffle piece assignment across films
      for(let i = slots.length-1; i>0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [slots[i], slots[j]] = [slots[j], slots[i]];
      }
      pieces[type] = slots;
    });

    // Assign pieces randomly to films
    team.films.forEach((f, fi) => {
      f.script = pieces.scripts[fi] || null;
      f.cast   = pieces.cast[fi]    || null;
      f.crew   = pieces.crew[fi]    || null;
    });

    // 1 director per film — shuffle and assign one each
    const dirs = [...team.directors];
    for(let i=dirs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[dirs[i],dirs[j]]=[dirs[j],dirs[i]];}
    team.films.forEach((f, fi) => { f.director = dirs[fi]?.dirIdx ?? null; });

    // Randomly assign release windows — each film gets a different window
    // Pick 3 random windows without repeating
    const shuffledWindows = [...windows].sort(() => Math.random()-0.5);
    const filmWindows = shuffledWindows.slice(0,3);
    team.films.forEach((f, fi) => { f.window = filmWindows[fi]; });

    // Random marketing budgets — varied, realistic spread
    team.films.forEach(f => {
      f.budget = marketingOptions[Math.floor(Math.random()*marketingOptions.length)];
    });
  });

  renderAssemble();
  toast('⚡ Auto-assembled — random windows, budgets & piece assignment');
}

function lockAllFilms() {
  const problems = [];
  G.teams.forEach(t => {
    // Check director usage counts
    const dirUsage = {};
    t.films.forEach((f,i) => {
      if(f.director !== null) dirUsage[f.director] = (dirUsage[f.director]||0) + 1;

      else if(!f.window) problems.push(`${t.name} Film ${i+1}: no release window`);

  if(problems.length > 0) {
    modal('Incomplete Films', `These films need attention:<br><br>${problems.map(p=>`• ${p}`).join('<br>')}`,
      [{label:'Go Back', action:()=>{}}]);

// ════════════════════════════════════════════════════════
//  PHASE 5: RESULTS
// ════════════════════════════════════════════════════════
let RESULTS = {}; // computed results

function computeResults() {
  RESULTS = {windows:{}, teams:{}};
  G.teams.forEach(t => {
    // Costs: talent + director flat fees + marketing (no starting budget)
    const talentCost   = teamSpend(t);
    const directorFees = t.directors.reduce((s,d) => s + (d.flatFee||0), 0);
    const sunkCost     = talentCost + directorFees;
    RESULTS.teams[t.id] = {
      totalRevenue:   0,
      totalMarketing: 0,
      sunkCost,       // talent + director flat fees (shown for reference)
      totalProfit:    0,
    };
  });

  RELEASE_WINDOWS.forEach(w => {
    // Gather all films in this window
    const films = [];
    G.teams.forEach(t => {
      t.films.forEach((f,fi) => {
        if(f.window !== w.id) return;
        const harmony = computeHarmony(t, f);
        const qualityMult = harmony.qualityMult || 0.3;
        const marketing = Math.max(0, parseFloat(f.budget) || 0);

        // SCORING FORMULA:
        // score = (quality × 3) + (marketing × 2) + (luck × 1)
        // Each component normalised to 0–1, then weighted and summed.

        const Q_MIN = 0.45, Q_MAX = 4.30;
        const qualityNorm   = Math.max(0, Math.min(1, (qualityMult - Q_MIN) / (Q_MAX - Q_MIN)));
        const marketingNorm = Math.log(1 + marketing / 30) / Math.log(1 + 200 / 30);
        const luck          = Math.random();

        const score = (qualityNorm * 3) + (marketingNorm * 2) + (luck * 1);
        const marketingBoost = marketingNorm; // for display

        films.push({
          team: t,
          film: f,
          fi,
          harmony,
          hmult: qualityMult,
          avgStars: harmony.avgStars || 0,
          budget: marketing,
          score,
          marketingNorm,
          luck,
          revenue: 0,
        });
      });
    });

    if(films.length === 0) {
      RESULTS.windows[w.id] = {films:[], pool:w.pool, unclaimed:w.pool};
      return;
    }

    // Sort by score descending
    films.sort((a,b) => b.score - a.score);

    // Pure proportional revenue allocation by score
    // Score already captures quality + marketing — no winner-take-all rule needed
    const totalScore = films.reduce((s,f) => s + f.score, 0);
    films.forEach(f => {
      f.revenue = totalScore > 0
        ? Math.round(w.pool * f.score / totalScore)
        : Math.round(w.pool / films.length);
    });

    // Tally team results — itemised costs per film
    films.forEach(f => {
      const dirDeal = f.team.directors.find(d=>d.dirIdx===f.film.director);
      const dirCut  = dirDeal ? Math.round(f.revenue * dirDeal.pct / 100) : 0;
      const dirFlatShare = dirDeal ? Math.round((dirDeal.flatFee||0) / 2) : 0; // director signed 2+ films, split flat fee

      // Talent costs: price of the actual piece assigned to this film
      const castCost   = f.film.cast   ? CAST_TIERS[f.film.cast.stars-1].price   : 0;
      const crewCost   = f.film.crew   ? CREW_TIERS[f.film.crew.stars-1].price   : 0;
      const scriptCost = f.film.script ? SCRIPT_TIERS[f.film.script.stars-1].price : 0;
      const filmTalentCost = castCost + crewCost + scriptCost + dirFlatShare;

      const netRevenue = f.revenue - dirCut;
      const filmProfit = netRevenue - f.budget - filmTalentCost;
      const totalCosts = dirCut + dirFlatShare + castCost + crewCost + scriptCost + f.budget;

      f.dirCut       = dirCut;
      f.dirFlatShare = dirFlatShare;
      f.castCost     = castCost;
      f.crewCost     = crewCost;
      f.scriptCost   = scriptCost;
      f.talentCost   = filmTalentCost;
      f.totalCosts   = totalCosts;
      f.netRevenue   = netRevenue;
      f.overhead     = filmTalentCost; // compat alias
      f.profit       = filmProfit;
      RESULTS.teams[f.team.id].totalRevenue   += f.revenue;
      RESULTS.teams[f.team.id].totalMarketing += f.budget;
    });

    RESULTS.windows[w.id] = {films, pool:w.pool};
  });

  // Final net profit = all revenue - all director % cuts - all marketing - sunk costs
  G.teams.forEach(t => {
    const tr = RESULTS.teams[t.id];
    // Sum all director % cuts across all this team's films
    let totalDirCuts = 0;
    RELEASE_WINDOWS.forEach(w => {
      const wr = RESULTS.windows[w.id];
      if(wr) wr.films.forEach(f => { if(f.team.id === t.id) totalDirCuts += (f.dirCut||0); });
    });
    tr.totalDirCuts  = totalDirCuts;
    tr.totalSpend    = tr.sunkCost + tr.totalMarketing;   // everything spent
    tr.totalProfit   = tr.totalRevenue - totalDirCuts - tr.totalMarketing - tr.sunkCost;
  });
}
