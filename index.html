// ── REVEAL ENGINE ────────────────────────────────────────

let _revealIdx   = 0;   // which season we're on (0=Summer,1=Fall,2=Winter)
let _revealAnim  = null; // rAF handle
let _circles     = [];
let _filmTargets = [];   // [{x,y,color,count}] per film in current window

const REVEAL_SEASONS = ['spring','summer','fall','holiday'];

function startReveal() {
  document.getElementById('reveal-start-wrap').style.display = 'none';
  document.getElementById('reveal-stage').style.display = 'block';
  _revealIdx = 0;
  revealSeason(_revealIdx);
}

function revealNextSeason() {
  _revealIdx++;
  if(_revealIdx >= REVEAL_SEASONS.length) {
    finishReveal();
    return;
  }
  revealSeason(_revealIdx);
}

function revealSeason(idx) {
  const wId = REVEAL_SEASONS[idx];
  const w   = RELEASE_WINDOWS.find(r => r.id === wId);
  const wr  = RESULTS.windows[wId];

  // Update labels
  document.getElementById('reveal-season-label').textContent = w.name.toUpperCase() + ' SEASON';
  document.getElementById('reveal-pool-label').textContent   = '$' + w.pool + 'M BOX OFFICE POOL';
  document.getElementById('reveal-next-btn').style.display   = 'none';
  document.getElementById('reveal-film-cards').innerHTML     = '';

  // Cancel any running animation
  if(_revealAnim) { cancelAnimationFrame(_revealAnim); _revealAnim = null; }

  const canvas = document.getElementById('reveal-canvas');
  // Set physical pixel size
  const W = canvas.offsetWidth;
  const H = 300;
  canvas.width  = W * window.devicePixelRatio || W;
  canvas.height = H * window.devicePixelRatio || H;
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.scale(dpr, dpr);

  if(!wr || wr.films.length === 0) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px Barlow,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No films in this season', W/2, H/2);
    showRevealNextOrFinish(idx);
    return;
  }

  const films = wr.films; // sorted best → worst

  // Build film target zones — evenly spaced across canvas
  const margin = 60;
  const spacing = (W - margin*2) / Math.max(films.length - 1, 1);
  // CIRCLE_COUNT and circleToMillion defined below after canvas setup
  // (defined as const inside revealSeason, so we reference them via closure)
  _filmTargets = films.map((f, i) => ({
    x: films.length === 1 ? W/2 : margin + i * spacing,
    y: H - 50,
    color: f.team.color,
    label: f.film.title || (f.team.name + ' #' + (f.fi+1)),
    revenue: f.revenue,
    count: 0, // set after CIRCLE_COUNT is defined
    assigned: 0,
    arrived: 0,
    f,
  }));

  // 1 circle = $1M, so circle count = pool size in millions
  // Cap at 1000 for performance, scale visually
  const CIRCLE_COUNT = Math.min(wr.pool, 1000);
  const circleToMillion = wr.pool / CIRCLE_COUNT; // each circle = this many $M

  // Assign circle counts to targets now that CIRCLE_COUNT is known
  _filmTargets.forEach(ft => {
    ft.count = Math.round(CIRCLE_COUNT * ft.revenue / wr.pool);
  });
  const totalAssigned = _filmTargets.reduce((s,t) => s + t.count, 0);
  _filmTargets[0].count += CIRCLE_COUNT - totalAssigned;

  // Initialise circles as a pool floating in the centre
  _circles = Array.from({length: CIRCLE_COUNT}, (_, i) => {
    const angle = Math.random() * Math.PI * 2;
    const r = 20 + Math.random() * 60;
    return {
      x:  W/2 + Math.cos(angle) * r,
      y:  H/2 + Math.sin(angle) * r,
      vx: (Math.random() - 0.5) * 1.2,
      vy: (Math.random() - 0.5) * 1.2,
      r:  Math.max(1.5, 3.5 - CIRCLE_COUNT / 500),  // smaller circles for larger pools
      color: '#ccc',
      targetColor: '#ccc',
      targetFilm: null,  // which film target this circle will go to
      phase: 'float',    // float → assigned → moving → arrived
      delay: i * 12,     // stagger dispatch in ms
      startedAt: null,
    };
  });

  // Assign circles to film targets (proportional)
  let ci = 0;
  _filmTargets.forEach((ft, fi) => {
    for(let j = 0; j < ft.count; j++) {
      if(_circles[ci]) {
        _circles[ci].targetFilm = fi;
        ci++;
      }
    }
  });
  // Shuffle so circles don't all go in order
  for(let i = _circles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [_circles[i].targetFilm, _circles[j].targetFilm] = [_circles[j].targetFilm, _circles[i].targetFilm];
  }

  // Track how many arrived per target
  _filmTargets.forEach(ft => ft.arrived = 0);

  const START_DELAY = 800; // ms before circles start being dispatched
  const startTime = performance.now();

  function loop(now) {
    ctx.clearRect(0, 0, W, H);

    // Draw target zones (film labels + circles-arrived counts)
    _filmTargets.forEach((ft, fi) => {
      // vertical line
      ctx.strokeStyle = ft.arrived > 0 ? ft.color : '#e0e0e0';
      ctx.lineWidth   = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(ft.x, ft.y - 30); ctx.lineTo(ft.x, ft.y + 10); ctx.stroke();
      ctx.setLineDash([]);

      // label
      ctx.fillStyle = ft.color;
      ctx.font = 'bold 10px Barlow,sans-serif';
      ctx.textAlign = 'center';
      const shortLabel = ft.label.length > 18 ? ft.label.slice(0,16)+'…' : ft.label;
      ctx.fillText(shortLabel, ft.x, ft.y + 26);

      // circle count
      if(ft.arrived > 0) {
        ctx.fillStyle = ft.color;
        ctx.font = 'bold 13px Barlow,sans-serif';
        const displayM = Math.round(ft.arrived * circleToMillion);
        ctx.fillText('$' + displayM + 'M', ft.x, ft.y - 36);
      }
    });

    let allArrived = true;

    _circles.forEach(c => {
      const elapsed = now - startTime;

      if(c.phase === 'float') {
        if(elapsed < START_DELAY + c.delay) {
          // gently drift in pool
          c.x += c.vx; c.y += c.vy;
          // soft bounce within central zone
          const dx = c.x - W/2, dy = c.y - H/2;
          if(Math.abs(dx) > 90) c.vx *= -1;
          if(Math.abs(dy) > 80) c.vy *= -1;
          // draw grey
          ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
          ctx.fillStyle = '#d0d0d0'; ctx.fill();
          allArrived = false;
          return;
        }
        // Dispatch!
        c.phase = 'moving';
        c.startedAt = now;
        const ft = _filmTargets[c.targetFilm];
        // Offset landing so circles cluster nicely around the target
        c.landX = ft.x + (Math.random() - 0.5) * 40;
        c.landY = ft.y - 10 + (Math.random() - 0.5) * 20;
        c.color = ft.color;
      }

      if(c.phase === 'moving') {
        allArrived = false;
        const ft = _filmTargets[c.targetFilm];
        const speed = 0.055 + Math.random() * 0.01;
        c.x += (c.landX - c.x) * speed;
        c.y += (c.landY - c.y) * speed;
        const dist = Math.hypot(c.landX - c.x, c.landY - c.y);
        if(dist < 2) {
          c.phase = 'arrived';
          ft.arrived++;
        }
        const t2 = Math.min(1, (now - c.startedAt) / 600);
        const r = c.r * (1 - 0.15 * t2);
        ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI*2);
        ctx.fillStyle = c.color; ctx.globalAlpha = 0.85; ctx.fill(); ctx.globalAlpha = 1;
        return;
      }

      if(c.phase === 'arrived') {
        // draw settled circle
        ctx.beginPath(); ctx.arc(c.x, c.y, c.r * 0.85, 0, Math.PI*2);
        ctx.fillStyle = c.color; ctx.globalAlpha = 0.7; ctx.fill(); ctx.globalAlpha = 1;
      }
    });

    if(allArrived) {
      // All done — show film result cards
      cancelAnimationFrame(_revealAnim);
      _revealAnim = null;
      showSeasonCards(wr, idx);
      return;
    }

    _revealAnim = requestAnimationFrame(loop);
  }

  _revealAnim = requestAnimationFrame(loop);
}

function showSeasonCards(wr, idx) {
  const cards = document.getElementById('reveal-film-cards');
  cards.innerHTML = '';

  wr.films.forEach((f, rank) => {
    const isWinner = rank === 0;
    const card = document.createElement('div');
    card.style.cssText = `flex:1;min-width:200px;background:#fff;border:2px solid #e0e0e0;border-radius:10px;overflow:hidden;opacity:0;transition:opacity 0.4s;display:flex;flex-direction:column;`;

    // Ingredient bars — quality, marketing, luck all 0–1
    const Q_MIN = 0.45, Q_MAX = 4.30;
    const qNorm = Math.max(0, Math.min(1, ((f.hmult||0.45) - Q_MIN) / (Q_MAX - Q_MIN)));
    const mNorm = f.marketingNorm || 0;
    const lNorm = f.luck || 0;

        ${bar('Marketing', mNorm, '#1558A0', '$' + (f.budget||0) + 'M')}
        ${bar('Luck', lNorm, '#6B4C9A', Math.round(lNorm*100) + ' / 100')}
      </div>
      <div style="padding:0 14px 14px;display:flex;flex-direction:column;flex:1;">
        <div style="border-top:1px solid #eee;padding-top:10px;margin-top:4px;display:flex;flex-direction:column;flex:1;">
          <div style="font-size:22px;font-family:'Bebas Neue',sans-serif;color:var(--gold);letter-spacing:0.05em;line-height:1;">$${f.revenue}M</div>
          <div style="font-size:10px;color:#bbb;margin:2px 0 10px;">box office revenue</div>
          <div style="font-size:15px;font-weight:700;color:#C0392B;margin-bottom:5px;">− $${f.totalCosts||0}M total costs</div>
          <div style="font-size:10px;color:#999;line-height:1.9;margin-bottom:10px;">
            ${f.dirFlatShare>0 ? `Director fee $${f.dirFlatShare}M<br>` : ''}${f.dirCut>0 ? `Director B.O. cut $${f.dirCut}M<br>` : ''}${f.castCost>0 ? `Cast $${f.castCost}M<br>` : ''}${f.crewCost>0 ? `Crew $${f.crewCost}M<br>` : ''}${f.scriptCost>0 ? `Script $${f.scriptCost}M<br>` : ''}${(f.budget||0)>0 ? `Marketing $${f.budget}M` : ''}
          </div>
          <div style="margin-top:auto;border-top:2px solid #eee;padding-top:8px;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:10px;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;">=&nbsp;Net profit</span>
            <span style="font-size:22px;font-family:'Bebas Neue',sans-serif;color:${profitColor};min-width:90px;text-align:right;">${f.profit>=0?'+':''}$${f.profit}M</span>
          </div>
        </div>
      </div>
    `;
    cards.appendChild(card);
    setTimeout(() => { card.style.opacity = '1'; }, rank * 180 + 100);
  });

  showRevealNextOrFinish(idx);
}

function showRevealNextOrFinish(idx) {
  const btn = document.getElementById('reveal-next-btn');
  btn.style.display = 'block';
  if(idx >= REVEAL_SEASONS.length - 1) {
    btn.textContent = '★ SEE FINAL STANDINGS ★';
    btn.onclick = showDramaticStandings;
  } else {
    const nextW = RELEASE_WINDOWS[idx + 1];
    btn.textContent = nextW.name.toUpperCase() + ' SEASON →';
    btn.onclick = revealNextSeason;
  }
}

function saveGame() {
  const saveData = {
    version: 1,
    timestamp: new Date().toISOString(),
    phase: G.phase,
    G: G,
    RESULTS: RESULTS
  };
  const json = JSON.stringify(saveData, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);

  // Generate a filename with team names + phase
  const teamNames = G.teams.map(t => t.name.replace(/\s+/g,'-')).join('_');
  const phaseLabel = {draft:'assemble-team', directors:'sign-directors', assemble:'assemble-films', results:'results'}[G.phase] || G.phase;
  const filename = `hollywood_${phaseLabel}_${teamNames}.json`;

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`💾 Game saved as ${filename}`);
}

function loadGame() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const saveData = JSON.parse(evt.target.result);
        if(!saveData.G || !saveData.phase) throw new Error('Invalid save file');

        // Restore state
        G = saveData.G;
        RESULTS = saveData.RESULTS || {};

        // Show game screen and correct phase
        document.getElementById('screen-title').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');

        showPhase(G.phase);

        // Re-render the correct phase
        if(G.phase === 'draft')      { renderDraft(); }
        if(G.phase === 'directors')  { renderDirectors(); }
        if(G.phase === 'assemble')   { renderAssemble(); }
        if(G.phase === 'results')    { renderResults(); }

        const saved = saveData.timestamp ? new Date(saveData.timestamp).toLocaleString() : 'unknown time';
        toast(`📂 Game loaded — saved ${saved}`);
      } catch(err) {
        alert('Could not load save file: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}


// ════════════════════════════════════════════════════════
//  TITLE SCREEN ANIMATION — Hollywood searchlights + bokeh
// ════════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('title-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth  * (window.devicePixelRatio||1);
    canvas.height = canvas.offsetHeight * (window.devicePixelRatio||1);
    ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.offsetWidth;
  const H = () => canvas.offsetHeight;

  // ── Searchlights ──
  const beams = Array.from({length:5}, (_, i) => ({
    x: W() * (0.1 + i * 0.2),  // base x position
    angle: -Math.PI/2 + (Math.random()-0.5)*0.5,
    speed: (0.004 + Math.random()*0.006) * (Math.random()>0.5?1:-1),
    width: 0.04 + Math.random()*0.03,
    alpha: 0.12 + Math.random()*0.08,
  }));

  // ── Bokeh lights ──
  const bokeh = Array.from({length:60}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: 2 + Math.random()*14,
    alpha: 0.04 + Math.random()*0.14,
    twinkleSpeed: 0.005 + Math.random()*0.015,
    twinkleOffset: Math.random()*Math.PI*2,
    gold: Math.random() > 0.6,
  }));

  // ── Film strip particles ──
  const strips = Array.from({length:8}, () => ({
    x: Math.random() * 1.2 - 0.1,
    y: Math.random(),
    speed: 0.0002 + Math.random()*0.0003,
    size: 18 + Math.random()*24,
    alpha: 0.03 + Math.random()*0.06,
    frames: 3 + Math.floor(Math.random()*5),
  }));

  let t = 0;

  function draw() {
    const w = W(), h = H();
    ctx.clearRect(0, 0, w, h);

    // Deep black background with subtle vignette
    const bg = ctx.createRadialGradient(w/2, h*0.4, 0, w/2, h*0.4, w*0.8);
    bg.addColorStop(0, '#0d0d0d');
    bg.addColorStop(1, '#000000');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // ── Draw bokeh ──
    bokeh.forEach(b => {
      const alpha = b.alpha * (0.6 + 0.4*Math.sin(t*b.twinkleSpeed + b.twinkleOffset));
      const grd = ctx.createRadialGradient(b.x*w, b.y*h, 0, b.x*w, b.y*h, b.r*2);
      const col = b.gold ? `200,169,81` : `255,255,255`;
      grd.addColorStop(0, `rgba(${col},${alpha})`);
      grd.addColorStop(1, `rgba(${col},0)`);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(b.x*w, b.y*h, b.r*2, 0, Math.PI*2);
      ctx.fill();
    });

    // ── Draw searchlight beams ──
    beams.forEach(beam => {
      beam.angle += beam.speed;
      // Clamp to sweep range (pointing upward)
      if(beam.angle > -0.2) { beam.angle = -0.2; beam.speed *= -1; }
      if(beam.angle < -Math.PI+0.2) { beam.angle = -Math.PI+0.2; beam.speed *= -1; }

      const bx = beam.x;
      // Beam tip at top of screen
      const tipX = bx + Math.cos(beam.angle) * h * 1.5;
      const tipY = h + Math.sin(beam.angle) * h * 1.5;

      // Wide fan gradient
      const halfW = beam.width;
      const lx1 = bx + Math.cos(beam.angle - halfW) * h * 1.5;
      const ly1 = h + Math.sin(beam.angle - halfW) * h * 1.5;
      const lx2 = bx + Math.cos(beam.angle + halfW) * h * 1.5;
      const ly2 = h + Math.sin(beam.angle + halfW) * h * 1.5;

      const grd = ctx.createLinearGradient(bx, h, tipX, tipY);
      grd.addColorStop(0,   `rgba(220,200,140,${beam.alpha*1.2})`);
      grd.addColorStop(0.3, `rgba(220,200,140,${beam.alpha*0.5})`);
      grd.addColorStop(1,   `rgba(220,200,140,0)`);

      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(bx, h);
      ctx.lineTo(lx1, ly1);
      ctx.lineTo(lx2, ly2);
      ctx.closePath();
      ctx.fill();
    });

    // ── Film strip particles drifting up ──
    strips.forEach(s => {
      s.y -= s.speed;
      if(s.y < -0.1) { s.y = 1.1; s.x = Math.random()*1.2-0.1; }
      const sx = s.x*w, sy = s.y*h, sz = s.size;
      ctx.strokeStyle = `rgba(255,255,255,${s.alpha})`;
      ctx.lineWidth = 1;
      // Draw tiny film strip rectangles
      for(let i=0;i<s.frames;i++) {
        ctx.strokeRect(sx, sy + i*(sz*0.7), sz*0.6, sz*0.5);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha*0.3})`;
        ctx.fillRect(sx+2, sy+2 + i*(sz*0.7), sz*0.6-4, sz*0.5-4);
      }
    });

    // ── Subtle horizontal scan line atmosphere ──
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for(let y=0; y<h; y+=4) {
      ctx.fillRect(0, y, w, 2);
    }

    t++;
    requestAnimationFrame(draw);
  }

  draw();
})();

</script>
</body>
</html>
